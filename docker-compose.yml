services:
  postgres:
    image: postgres:16
    container_name: encomiendas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encomiendas_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: encomiendas_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: encomiendas_db
      JWT_SECRET: super_secreto_cambiar
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    container_name: encomiendas_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
volumes:
  pgdata:
